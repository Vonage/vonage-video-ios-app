			shellPath = /bin/sh;
			shellScript = "#!/bin/bash\n\n# SwiftLint Run Script Phase\n# Add this script to your target's Build Phases > Run Script Phase\n# \n# This script ensures SwiftLint uses the configuration file at the project root\n# and provides consistent behavior between Xcode and CLI\n\nset -e\n\n# Configuration\nCONFIG_FILE=\"${SRCROOT}/../../.swiftlint.yml\"\nSWIFTLINT_PATH=\"\"\n\n# Function to find SwiftLint\nfind_swiftlint() {\n    # Check if SwiftLint is installed via Homebrew\n    if command -v /opt/homebrew/bin/swiftlint >/dev/null 2>&1; then\n        SWIFTLINT_PATH=\"/opt/homebrew/bin/swiftlint\"\n    elif command -v /usr/local/bin/swiftlint >/dev/null 2>&1; then\n        SWIFTLINT_PATH=\"/usr/local/bin/swiftlint\"\n    # Check if SwiftLint is available in PATH\n    elif command -v swiftlint >/dev/null 2>&1; then\n        SWIFTLINT_PATH=\"swiftlint\"\n    # Check if SwiftLint is installed via Mint\n    elif command -v mint >/dev/null 2>&1 && mint which swiftlint >/dev/null 2>&1; then\n        SWIFTLINT_PATH=\"mint run swiftlint\"\n    else\n        echo \"warning: SwiftLint not found. Install it via Homebrew, Mint, or add it to your PATH.\"\n        echo \"Homebrew: brew install swiftlint\"\n        echo \"Mint: mint install realm/SwiftLint\"\n        exit 0\n    fi\n}\n\n# Function to run SwiftLint\nrun_swiftlint() {\n    echo \"🔍 Running SwiftLint with configuration: ${CONFIG_FILE}\"\n    \n    # Check if config file exists\n    if [ ! -f \"${CONFIG_FILE}\" ]; then\n        echo \"warning: SwiftLint configuration file not found at ${CONFIG_FILE}\"\n        echo \"Creating basic configuration file...\"\n        \n        # Create basic config if it doesn't exist\n        cat > \"${CONFIG_FILE}\" << 'EOF'\n# SwiftLint Configuration\nincluded:\n  - VERA/\n\nexcluded:\n  - \"**/DerivedData\"\n  - \"**/.build\"\n  - \"**/Pods\"\n  - \"**/build\"\n\ndisabled_rules:\n  - trailing_comma\n  - type_body_length\n  - function_body_length\n\nline_length:\n  warning: 120\n  error: 200\n\nreporter: \"xcode\"\nEOF\n        echo \"✅ Created basic SwiftLint configuration at ${CONFIG_FILE}\"\n    fi\n    \n    # Run SwiftLint with explicit config path\n    if [ \"${SWIFTLINT_PATH}\" = \"mint run swiftlint\" ]; then\n        mint run swiftlint lint --config \"${CONFIG_FILE}\"\n    else\n        \"${SWIFTLINT_PATH}\" lint --config \"${CONFIG_FILE}\"\n    fi\n}\n\n# Main execution\necho \"🚀 Starting SwiftLint Run Script Phase\"\necho \"📁 Project root: ${SRCROOT}\"\necho \"📁 Build root: ${BUILD_ROOT}\"\necho \"🎯 Target: ${TARGET_NAME}\"\n\n# Find SwiftLint\nfind_swiftlint\n\nif [ -z \"${SWIFTLINT_PATH}\" ]; then\n    echo \"❌ SwiftLint not found\"\n    exit 0\nfi\n\necho \"✅ Found SwiftLint at: ${SWIFTLINT_PATH}\"\n\n# Run SwiftLint\nrun_swiftlint\n\necho \"🎉 SwiftLint completed successfully\"\n";
		};
