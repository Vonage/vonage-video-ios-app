# SonarCloud configuration for vonage-video-ios-app

# Project identification
sonar.projectKey=vonage-video-ios-app
sonar.organization=vonage
sonar.projectName=Vonage Video iOS App
sonar.projectVersion=1.0

# Source code configuration
sonar.sources=VERA/VERA,VERA/VERACore/VERACore,VERA/VERAOpenTok/VERAOpenTok
sonar.tests=VERA/VERATests,VERA/VERACore/VERACoreTests,VERA/VERAOpenTok/VERAOpenTokTests,VERA/VERAUITests
sonar.sourceEncoding=UTF-8

# Language-specific settings
sonar.swift.coverage.reportPaths=coverage-reports/coverage.json
sonar.swift.file.suffixes=.swift

# Test execution reports
sonar.testExecutionReportPaths=coverage-reports/test-results.xml

# Coverage exclusions
sonar.coverage.exclusions=**/*Tests.swift,**/*Test.swift,**/Test*.swift,**/*Mock*.swift,**/*Stub*.swift

# Duplications exclusions
sonar.cpd.exclusions=**/*Tests.swift,**/*Test.swift

# Analysis exclusions
sonar.exclusions=**/build/**,**/DerivedData/**,**/Pods/**,**/Carthage/**,**/.build/**,**/vendor/**,**/*.pbxproj,**/*.storyboard,**/*.xib

# Additional settings
sonar.verbose=false
sonar.pullrequest.github.repository=vonage/vonage-video-ios-app
