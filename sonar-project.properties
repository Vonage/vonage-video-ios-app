# SonarCloud configuration for vonage-video-ios-app
# This file serves as the single source of truth for SonarCloud project configuration.
# Scripts and workflows read these values dynamically to avoid duplication.

# Project identification
sonar.projectKey=Vonage_vonage-video-ios-app
sonar.organization=vonage
sonar.projectName=Vonage Video iOS App
sonar.projectVersion=1.0

# Source code configuration
sonar.sources=VERA/VERAApp/VERA,VERA/VERACore/VERACore,VERA/VERAOpenTok/VERAOpenTok,VERA/VERAChat/VERAChat,VERA/VERAOpenTokChatPlugin/VERAOpenTokChatPlugin,VERA/VERACommonUI
sonar.tests=VERA/VERAApp/VERATests,VERA/VERACore/VERACoreTests,VERA/VERAOpenTok/VERAOpenTokTests,VERA/VERAApp/VERAUITests,VERA/VERAChat/VERAChatTests,VERA/VERAOpenTokChatPlugin/VERAOpenTokChatPluginTests
sonar.sourceEncoding=UTF-8

# Language-specific settings
sonar.swift.file.suffixes=.swift
sonar.swift.appName=VERA
sonar.swift.project=VERA/VERA.xcworkspace
sonar.swift.scheme=VERA
sonar.swift.simulator=iOS Simulator,name=iPhone 17
sonar.swift.excludedPaths=**/Pods/**,**/Carthage/**,**/build/**,**/DerivedData/**

# Coverage paths - using both generic XML and SwiftLint JSON formats
sonar.coverageReportPaths=coverage-reports/sonarqube-generic-coverage.xml

# Swift coverage and SwiftLint report paths
sonar.swift.coverage.reportPaths=
sonar.swift.swiftLint.reportPaths=
#sonar.swift.swiftlint.reportPaths=coverage-reports/coverage.json

# Completely disable SwiftLint sensor to prevent JSON file detection
sonar.swift.swiftLint.enable=false

# Force SonarCloud to only use generic XML coverage
sonar.coverage.dtdVerification=false

#sonar.testExecutionReportPaths=build/reports/junit.xml

# Coverage exclusions - include problematic Swift files here instead of analysis exclusions
sonar.coverage.exclusions=**/*Tests.swift,**/*Test.swift,**/Test*.swift,**/*Mock*.swift,**/*Stub*.swift,**/*Preview*.swift,**/Previews/**,**/*+Preview.swift,**/ContentView.swift,**/SceneDelegate.swift,**/AppDelegate.swift,**/*App.swift,VERA/VERAChat/VERAChat/UI/View/ChatRow.swift,VERA/VERAChat/VERAChat/UI/View/ChatPanel.swift,VERA/VERAChat/VERAChat/UI/View/ChatPanelMessages.swift,VERA/VERAChat/VERAChatAppTestHelpers/**,VERA/VERACore/VERATestHelpers/**

# Duplications exclusions
sonar.cpd.exclusions=**/*Tests.swift,**/*Test.swift,**/*Preview*.swift

# Analysis exclusions - infrastructure files and problematic Swift files that cause parser errors
sonar.exclusions=**/build/**,**/DerivedData/**,**/Pods/**,**/Carthage/**,**/.build/**,**/vendor/**,**/*.pbxproj,**/*.storyboard,**/*.xib,**/*.xcassets/**,**/Info.plist,**/*-Bridging-Header.h,**/Package.swift,**/Package.resolved,**/build-wrapper-dump.json,**/coverage.json,**/*.json,VERA/VERAChat/VERAChat/UI/View/ChatRow.swift,VERA/VERAChat/VERAChat/UI/View/ChatPanel.swift,VERA/VERAChat/VERAChat/UI/View/ChatPanelMessages.swift


# Quality Gate settings
sonar.newCodePeriod.type=reference_branch
sonar.newCodePeriod.value=main
sonar.duplicatedLines.threshold=3
sonar.maintainabilityRating.threshold=A
sonar.reliabilityRating.threshold=A
sonar.securityRating.threshold=A

# Pull request configuration
sonar.pullrequest.github.repository=vonage/vonage-video-ios-app
sonar.pullrequest.provider=github
sonar.pullrequest.github.endpoint=https://api.github.com/

# Coverage thresholds
sonar.coverage.newCodeThreshold=20

# Additional settings
sonar.verbose=true