# SonarCloud configuration for vonage-video-ios-app
# This file serves as the single source of truth for SonarCloud project configuration.
# Scripts and workflows read these values dynamically to avoid duplication.

# Project identification
sonar.projectKey=Vonage_vonage-video-ios-app
sonar.organization=vonage
sonar.projectName=Vonage Video iOS App
sonar.projectVersion=1.0

# Source code configuration
sonar.sources=VERA/VERAApp/VERA,VERA/VERACore/VERACore,VERA/VERAOpenTok/VERAOpenTok,VERA/VERAChat/VERAChat,VERA/VERAOpenTokChatPlugin/VERAOpenTokChatPlugin
sonar.tests=VERA/VERAApp/VERATests,VERA/VERACore/VERACoreTests,VERA/VERAOpenTok/VERAOpenTokTests,VERA/VERAApp/VERAUITests,VERA/VERAChat/VERAChatTests,VERA/VERAOpenTokChatPlugin/VERAOpenTokChatPluginTests,VERA/VERAOpenTokChatPlugin/VERAOpenTokChatPluginTests
sonar.sourceEncoding=UTF-8

# Language-specific settings
sonar.swift.file.suffixes=.swift
sonar.swift.appName=VERA
sonar.swift.project=VERA/VERA.xcworkspace
sonar.swift.scheme=VERA
sonar.swift.simulator=iOS Simulator,name=iPhone 15
sonar.swift.excludedPaths=**/Pods/**,**/Carthage/**,**/build/**,**/DerivedData/**

# Coverage paths - dynamically set by upload script based on available files
sonar.coverageReportPaths=coverage-reports/sonarqube-generic-coverage.xml
sonar.swift.coverage.reportPaths=coverage-reports/coverage.json

# Test execution reports (commented out - causing XML parsing errors)
# sonar.testExecutionReportPaths=coverage-reports/test-results.xml

# Coverage exclusions
sonar.coverage.exclusions=**/*Tests.swift,**/*Test.swift,**/Test*.swift,**/*Mock*.swift,**/*Stub*.swift,**/*Preview*.swift,**/Previews/**,**/*+Preview.swift,**/ContentView.swift,**/SceneDelegate.swift,**/AppDelegate.swift,**/*App.swift

# Duplications exclusions
sonar.cpd.exclusions=**/*Tests.swift,**/*Test.swift,**/*Preview*.swift

# Analysis exclusions (completas para iOS)
sonar.exclusions=**/build/**,**/DerivedData/**,**/Pods/**,**/Carthage/**,**/.build/**,**/vendor/**,**/*.pbxproj,**/*.storyboard,**/*.xib,**/*.xcassets/**,**/Info.plist,**/*-Bridging-Header.h,**/Package.swift,**/Package.resolved

# Quality Gate settings
sonar.qualitygate.wait=true
sonar.newCodePeriod.type=reference_branch
sonar.newCodePeriod.value=main
sonar.duplicatedLines.threshold=3
sonar.maintainabilityRating.threshold=A
sonar.reliabilityRating.threshold=A
sonar.securityRating.threshold=A

# Pull request configuration
sonar.pullrequest.github.repository=vonage/vonage-video-ios-app
sonar.pullrequest.provider=github
sonar.pullrequest.github.endpoint=https://api.github.com/

# Coverage thresholds (temporary - should be increased as coverage improves)
sonar.coverage.newCodeThreshold=60

# Additional settings
sonar.verbose=false