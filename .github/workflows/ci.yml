name: CI

permissions:
  contents: write
  actions: read

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  format-check:
    runs-on: macos-26
    steps:
    - uses: actions/checkout@v4

    - name: Install swift-format
      run: |
        brew install swift-format
        swift-format --version
  
    - name: Check Swift formatting
      run: |
        chmod +x scripts/format.sh
        ./scripts/format.sh --check

  unit-tests:
    runs-on: macos-26
    needs: [format-check]
    outputs:
      test-results: ${{ steps.tests.outcome }}
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Pull LFS files
      run: git lfs pull
    
    - name: Install SwiftLint
      run: |
        brew install swiftlint

    - name: Install Tuist
      run: brew install tuist

    - name: Generate project with Tuist
      run: |
        cd VERA
        export DEVELOPMENT_TEAM=${{ secrets.DEVELOPMENT_TEAM }}
        ./Scripts/regenerateSigningConfig.sh
        tuist generate --no-open
        cd ..

    - name: List available simulators
      run: |
        echo "📱 Available iOS Simulators:"
        xcrun simctl list devices

    - name: Export build flags
      run: |
        {
          echo 'XCODE_COMMON_FLAGS=COMPILER_INDEX_STORE_ENABLE=NO ONLY_ACTIVE_ARCH=YES CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO'
        } >> $GITHUB_ENV

    - name: Run VERACoreTests (macOS)
      id: core-tests-macos
      run: |
        echo "🧪 Running VERACoreTests on macOS"
        xcodebuild test \
          -workspace VERA/VERA.xcworkspace \
          -scheme VERACoreTests \
          -destination "platform=macOS" \
          -derivedDataPath DerivedData \
          -enableCodeCoverage YES \
          -resultBundlePath DerivedData/VERACoreTests-macOS.xcresult \
          $XCODE_COMMON_FLAGS | xcpretty

    - name: Run VERAChatTests (macOS)
      id: chat-tests-macos
      run: |
        echo "🧪 Running VERAChatTests on macOS"
        xcodebuild test \
          -workspace VERA/VERA.xcworkspace \
          -scheme VERAChatTests \
          -destination "platform=macOS" \
          -derivedDataPath DerivedData \
          -enableCodeCoverage YES \
          -resultBundlePath DerivedData/VERAChatTests-macOS.xcresult \
          $XCODE_COMMON_FLAGS | xcpretty

    - name: Preboot iOS Simulator
      run: |
        set -euo pipefail
        xcrun simctl boot "iPhone 17" || true 

    - name: Run VERACoreSnapshotTests (iOS Simulator)
      id: core-snapshot-tests
      timeout-minutes: 15
      run: |
        echo "📸 Building VERACoreSnapshotTests on iOS Simulator"
        xcodebuild build-for-testing \
          -workspace VERA/VERA.xcworkspace \
          -scheme VERACoreSnapshotTests \
          -destination "platform=iOS Simulator,name=iPhone 17" \
          -derivedDataPath DerivedData \
          -enableCodeCoverage YES \
          -parallel-testing-enabled NO \
          $XCODE_COMMON_FLAGS | xcpretty

        echo "📸 Running VERACoreSnapshotTests on iOS Simulator"
        xcodebuild test-without-building \
          -workspace VERA/VERA.xcworkspace \
          -scheme VERACoreSnapshotTests \
          -destination "platform=iOS Simulator,name=iPhone 17" \
          -derivedDataPath DerivedData \
          -enableCodeCoverage YES \
          -resultBundlePath DerivedData/VERACoreSnapshotTests-iOS.xcresult \
          -parallel-testing-enabled NO \
          $XCODE_COMMON_FLAGS | xcpretty

    - name: Run VERAChatSnapshotTests (iOS Simulator)
      id: chat-snapshot-tests
      timeout-minutes: 15
      run: |
        echo "📸 Building VERAChatSnapshotTests on iOS Simulator"
        xcodebuild build-for-testing \
          -workspace VERA/VERA.xcworkspace \
          -scheme VERAChatSnapshotTests \
          -destination "platform=iOS Simulator,name=iPhone 17" \
          -derivedDataPath DerivedData \
          -enableCodeCoverage YES \
          -parallel-testing-enabled NO \
          $XCODE_COMMON_FLAGS | xcpretty
        
        echo "📸 Running VERAChatSnapshotTests on iOS Simulator"
        xcodebuild test-without-building \
          -workspace VERA/VERA.xcworkspace \
          -scheme VERAChatSnapshotTests \
          -destination "platform=iOS Simulator,name=iPhone 17" \
          -derivedDataPath DerivedData \
          -enableCodeCoverage YES \
          -resultBundlePath DerivedData/VERAChatSnapshotTests-iOS.xcresult \
          -parallel-testing-enabled NO \
          $XCODE_COMMON_FLAGS | xcpretty

    - name: Run VERAOpenTokChatPluginTests (iOS Simulator)
      id: ot-chat-plugin-tests
      timeout-minutes: 15
      run: |
        echo "📸 Running VERAOpenTokChatPluginTests on iOS Simulator"
        xcodebuild build-for-testing \
          -workspace VERA/VERA.xcworkspace \
          -scheme VERAOpenTokChatPluginTests \
          -destination "platform=iOS Simulator,name=iPhone 17" \
          -derivedDataPath DerivedData \
          -enableCodeCoverage YES \
          $XCODE_COMMON_FLAGS | xcpretty

        xcodebuild test-without-building \
          -workspace VERA/VERA.xcworkspace \
          -scheme VERAOpenTokChatPluginTests \
          -destination "platform=iOS Simulator,name=iPhone 17" \
          -derivedDataPath DerivedData \
          -enableCodeCoverage YES \
          -resultBundlePath DerivedData/VERAOpenTokChatPluginTests-iOS.xcresult \
          $XCODE_COMMON_FLAGS | xcpretty

    - name: Run VERAOpenTokTests (iOS Simulator)
      id: opentok-tests
      timeout-minutes: 15
      run: |
        echo "📡 Running VERAOpenTokTests on iOS Simulator"
        xcodebuild build-for-testing \
          -workspace VERA/VERA.xcworkspace \
          -scheme VERAOpenTokTests \
          -destination "platform=iOS Simulator,name=iPhone 17" \
          -derivedDataPath DerivedData \
          -enableCodeCoverage YES \
          $XCODE_COMMON_FLAGS | xcpretty

        xcodebuild test-without-building \
          -workspace VERA/VERA.xcworkspace \
          -scheme VERAOpenTokTests \
          -destination "platform=iOS Simulator,name=iPhone 17" \
          -derivedDataPath DerivedData \
          -enableCodeCoverage YES \
          -resultBundlePath DerivedData/VERAOpenTokTests-iOS.xcresult \
          $XCODE_COMMON_FLAGS | xcpretty
    
    - name: Run VERACommonUITests (iOS Simulator)
      id: common-ui-tests
      timeout-minutes: 15
      run: |
        echo "📡 Running VERACommonUITests on iOS Simulator"
        xcodebuild build-for-testing \
          -workspace VERA/VERA.xcworkspace \
          -scheme VERACommonUITests \
          -destination "platform=iOS Simulator,name=iPhone 17" \
          -derivedDataPath DerivedData \
          -enableCodeCoverage YES \
          $XCODE_COMMON_FLAGS | xcpretty

        xcodebuild test-without-building \
          -workspace VERA/VERA.xcworkspace \
          -scheme VERACommonUITests \
          -destination "platform=iOS Simulator,name=iPhone 17" \
          -derivedDataPath DerivedData \
          -enableCodeCoverage YES \
          -resultBundlePath DerivedData/VERACommonUITests-iOS.xcresult \
          $XCODE_COMMON_FLAGS | xcpretty

    - name: Run VERATests (iOS Simulator)
      id: vera-app-tests
      timeout-minutes: 15
      run: |
        echo "📡 Running VERATests on iOS Simulator"
        xcodebuild build-for-testing \
          -workspace VERA/VERA.xcworkspace \
          -scheme VERATests \
          -destination "platform=iOS Simulator,name=iPhone 17" \
          -derivedDataPath DerivedData \
          -enableCodeCoverage YES \
          $XCODE_COMMON_FLAGS | xcpretty

        xcodebuild test-without-building \
          -workspace VERA/VERA.xcworkspace \
          -scheme VERATests \
          -destination "platform=iOS Simulator,name=iPhone 17" \
          -derivedDataPath DerivedData \
          -enableCodeCoverage YES \
          -resultBundlePath DerivedData/VERATests-iOS.xcresult \
          $XCODE_COMMON_FLAGS | xcpretty

    - name: Run VERAOpenTokCallKitPluginTests (iOS Simulator)
      id: vera-callkit-tests
      timeout-minutes: 15
      run: |
        echo "📡 Running VERAOpenTokCallKitPluginTests on iOS Simulator"
        xcodebuild test \
          -workspace VERA/VERA.xcworkspace \
          -scheme VERAOpenTokCallKitPluginTests \
          -destination "platform=iOS Simulator,name=iPhone 17" \
          -derivedDataPath DerivedData \
          -enableCodeCoverage YES \
          -resultBundlePath DerivedData/VERAOpenTokCallKitPluginTests-iOS.xcresult \
          $XCODE_COMMON_FLAGS | xcpretty

    - name: Upload all test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: unit-test-results
        path: |
          DerivedData/VERACoreTests-macOS.xcresult
          DerivedData/VERAChatTests-macOS.xcresult
          DerivedData/VERAOpenTokChatPluginTests-macOS.xcresult
          DerivedData/VERAOpenTokTests-iOS.xcresult
          DerivedData/VERACoreSnapshotTests-iOS.xcresult
          DerivedData/VERAOpenTokChatPluginTests-iOS.xcresult
          DerivedData/VERATests-iOS.xcresult
          DerivedData/VERAOpenTokCallKitPluginTests-iOS.xcresult
          DerivedData/Build/Products/
          
  sonarcloud:
    name: SonarCloud Analysis
    runs-on: macos-26
    needs: [unit-tests]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' || github.event_name == 'pull_request'
    
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Download unit test results
      uses: actions/download-artifact@v4
      with:
        name: unit-test-results
        path: DerivedData/
    
    - name: Install dependencies
      run: |
        brew update
        brew install sonar-scanner coreutils

    - name: Merge coverage from ./DerivedData
      run: |
        ./scripts/merge_coverage.sh

    - name: SonarCloud Analysis
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      run: |
        sonar-scanner \
          -Dsonar.host.url=https://sonarcloud.io \
          -Dsonar.verbose=true

  upload-testflight:
    name: Upload to TestFlight
    runs-on: macos-26
    needs: [unit-tests]
    if: (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop') && github.event_name == 'push'
    timeout-minutes: 30
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Pull LFS files
      run: git lfs pull
    
    - name: Install Tuist
      run: brew install tuist

    - name: Import certs
      uses: Apple-Actions/import-codesign-certs@v5.0.2
      with:
        p12-file-base64: ${{ secrets.APPSTORE_CERTIFICATES_FILE_BASE64 }}
        p12-password: ${{ secrets.APPSTORE_CERTIFICATES_PASSWORD }}

    - name: Provisioning profile
      uses: Apple-Actions/download-provisioning-profiles@v4
      with:
        profile-type: IOS_APP_STORE
        bundle-id: 'com.vonage.VERA'
        issuer-id: ${{ vars.APPSTORE_ISSUER_ID }}
        api-key-id: ${{ vars.APPSTORE_API_KEY_ID }}
        api-private-key: ${{ secrets.APPSTORE_API_PRIVATE_KEY }}

    - name: Generate build number
      id: buildnumber
      run: |
        # Generate build number with only numeric values for App Store compatibility
        # Use timestamp to ensure uniqueness and avoid conflicts
        TIMESTAMP=$(date +%s)
        BUILD_NUMBER="${GITHUB_RUN_NUMBER}.${TIMESTAMP: -6}"
        echo "BUILD_NUMBER=$BUILD_NUMBER" >> $GITHUB_OUTPUT
        echo "Generated build number: $BUILD_NUMBER"

    - name: Generate project with Tuist
      run: |
        cd VERA
        export DEVELOPMENT_TEAM=${{ secrets.DEVELOPMENT_TEAM }}
        export CURRENT_PROJECT_VERSION=${{ steps.buildnumber.outputs.BUILD_NUMBER }}
        ./Scripts/regenerateSigningConfig.sh
        tuist generate --no-open
        cd ..

    - name: Build archive
      run: |
          echo "Building archive with build number: ${{ steps.buildnumber.outputs.BUILD_NUMBER }}"
          xcodebuild -workspace VERA/VERA.xcworkspace \
            -scheme VERA \
            -sdk iphoneos \
            -configuration Release \
            -allowProvisioningUpdates \
            -archivePath $PWD/build/VERA.xcarchive \
            CURRENT_PROJECT_VERSION="${{ steps.buildnumber.outputs.BUILD_NUMBER }}" \
            archive | xcpretty

    - name: Export IPA
      run: |
        xcodebuild -exportArchive \
            -archivePath "$PWD/build/VERA.xcarchive" \
            -exportOptionsPlist "$PWD/ExportOptions.plist" \
            -allowProvisioningUpdates \
            -exportPath "$PWD/build" | xcpretty

    - name: Upload to TestFlight
      uses: apple-actions/upload-testflight-build@v3
      with:
        app-path: build/VERA.ipa
        issuer-id: ${{ vars.APPSTORE_ISSUER_ID }}
        api-key-id: ${{ vars.APPSTORE_API_KEY_ID }}
        api-private-key: ${{ secrets.APPSTORE_API_PRIVATE_KEY }}
