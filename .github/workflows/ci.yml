name: CI

permissions:
  contents: write
  actions: read

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  format-check:
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Install swift-format
      run: brew install swift-format
  
    - name: Check Swift formatting
      run: |
        chmod +x scripts/format.sh
        ./scripts/format.sh --check

  unit-tests:
    runs-on: macos-latest
    needs: [format-check]
    outputs:
      test-results: ${{ steps.tests.outcome }}
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Pull LFS files
      run: git lfs pull
    
    - name: Set up Xcode
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: latest-stable
    
    - name: Cache derived data
      uses: actions/cache@v4
      with:
        path: ~/Library/Developer/Xcode/DerivedData
        key: ${{ runner.os }}-derived-data-${{ hashFiles('**/*.xcworkspace', '**/*.xcodeproj') }}
        restore-keys: |
          ${{ runner.os }}-derived-data-
    
    - name: Run VERACoreTests (macOS)
      id: core-tests-macos
      run: |
        echo "🧪 Running VERACoreTests on macOS"
        xcodebuild test \
          -workspace VERA/VERA.xcworkspace \
          -scheme VERACore \
          -destination "platform=macOS" \
          -only-testing:VERACoreTests \
          -derivedDataPath DerivedData \
          -enableCodeCoverage YES \
          -resultBundlePath DerivedData/VERACoreTests-macOS.xcresult \
          CODE_SIGN_IDENTITY="" \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGNING_ALLOWED=NO

    # Temporarily disabled until CI Xcode version is updated
    # - name: Run VERACoreSnapshotTests (iOS Simulator)
    #   id: snapshot-tests
    #   run: |
    #     echo "📸 Running VERACoreSnapshotTests on iOS Simulator"
    #     xcodebuild test \
    #       -workspace VERA/VERA.xcworkspace \
    #       -scheme VERACoreSnapshotTests \
    #       -destination "platform=iOS Simulator,name=iPhone 16" \
    #       -derivedDataPath DerivedData \
    #       -enableCodeCoverage YES \
    #       -resultBundlePath DerivedData/VERACoreSnapshotTests-iOS.xcresult \
    #       CODE_SIGN_IDENTITY="" \
    #       CODE_SIGNING_REQUIRED=NO \
    #       CODE_SIGNING_ALLOWED=NO
    
    - name: Run VERAOpenTokTests (iOS Simulator)
      id: opentok-tests
      run: |
        echo "📡 Running VERAOpenTokTests on iOS Simulator"
        xcodebuild test \
          -workspace VERA/VERA.xcworkspace \
          -scheme VERAOpenTokTests \
          -destination "platform=iOS Simulator,name=iPhone 16" \
          -only-testing:VERAOpenTokTests \
          -derivedDataPath DerivedData \
          -enableCodeCoverage YES \
          -resultBundlePath DerivedData/VERAOpenTokTests-iOS.xcresult \
          CODE_SIGN_IDENTITY="" \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGNING_ALLOWED=NO
    
    - name: Upload all test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: unit-test-results
        path: |
          DerivedData/VERACoreTests-macOS.xcresult
          DerivedData/VERAOpenTokTests-iOS.xcresult
          DerivedData/Build/Products/
          # DerivedData/VERACoreSnapshotTests-iOS.xcresult  # Temporarily disabled

  ui-tests:
    runs-on: macos-latest
    needs: [format-check]
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Xcode
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: latest-stable
    
    - name: Pull LFS files
      run: git lfs pull

    - name: Cache derived data
      uses: actions/cache@v4
      with:
        path: ~/Library/Developer/Xcode/DerivedData
        key: ${{ runner.os }}-derived-data-ui-${{ hashFiles('**/*.xcworkspace', '**/*.xcodeproj') }}
        restore-keys: |
          ${{ runner.os }}-derived-data-

    - name: Run UI Tests
      run: |
        echo "🖥️ Running VERAUITests on iOS Simulator..."
        xcodebuild test \
          -workspace VERA/VERA.xcworkspace \
          -scheme VERAUITests \
          -destination 'platform=iOS Simulator,name=iPhone 16' \
          -only-testing:VERAUITests \
          -enableCodeCoverage YES \
          -derivedDataPath DerivedData \
          -resultBundlePath DerivedData/VERAUITests-iOS.xcresult \
          CODE_SIGN_IDENTITY="" \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGNING_ALLOWED=NO \
          -parallel-testing-enabled NO
          
    - name: Upload UI test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: ui-test-results
        path: DerivedData/VERAUITests-iOS.xcresult

  sonarcloud:
    name: SonarCloud Analysis
    runs-on: macos-latest
    needs: [unit-tests, ui-tests]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' || github.event_name == 'pull_request'
    
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Download unit test results
      uses: actions/download-artifact@v4
      with:
        name: unit-test-results
        path: DerivedData/
    
    - name: Download UI test results
      uses: actions/download-artifact@v4
      with:
        name: ui-test-results
        path: DerivedData/
    
    - name: Generate comprehensive coverage reports
      run: |
        echo "📊 Generating coverage from all test results..."
        
        # Install slather for proper XML coverage conversion
        echo "🔧 Installing slather for SonarCloud XML conversion..."
        gem install slather
        
        # Ensure coverage-reports directory exists
        mkdir -p coverage-reports
        
        # Try to generate coverage reports
        if ./scripts/generate-coverage.sh; then
          echo "✅ Coverage reports generated successfully"
          
          # Verify the XML file exists and is valid
          if [ -f "coverage-reports/sonarqube-generic-coverage.xml" ]; then
            echo "✅ SonarQube XML coverage report found"
            # Basic XML validation
            if xmllint --noout coverage-reports/sonarqube-generic-coverage.xml 2>/dev/null; then
              echo "✅ XML coverage report is valid"
            else
              echo "⚠️ XML coverage report is malformed, creating minimal report"
              echo '<?xml version="1.0" encoding="UTF-8"?><coverage version="1"><file path="dummy.swift"><lineToCover lineNumber="1" covered="false"/></file></coverage>' > coverage-reports/sonarqube-generic-coverage.xml
            fi
          else
            echo "⚠️ XML coverage report not found, creating minimal report"
            echo '<?xml version="1.0" encoding="UTF-8"?><coverage version="1"><file path="dummy.swift"><lineToCover lineNumber="1" covered="false"/></file></coverage>' > coverage-reports/sonarqube-generic-coverage.xml
          fi
          
          # Verify JSON file
          if [ -f "coverage-reports/coverage.json" ]; then
            if jq empty coverage-reports/coverage.json 2>/dev/null; then
              echo "✅ JSON coverage report is valid"
            else
              echo "⚠️ JSON coverage report is malformed, creating minimal report"
              echo '{"coveredLines":0,"executableLines":1}' > coverage-reports/coverage.json
            fi
          else
            echo "⚠️ JSON coverage report not found, creating minimal report"
            echo '{"coveredLines":0,"executableLines":1}' > coverage-reports/coverage.json
          fi
        else
          echo "⚠️ Coverage generation failed, using minimal coverage reports"
          echo '{"coveredLines":0,"executableLines":1}' > coverage-reports/coverage.json
          echo '<?xml version="1.0" encoding="UTF-8"?><coverage version="1"><file path="dummy.swift"><lineToCover lineNumber="1" covered="false"/></file></coverage>' > coverage-reports/sonarqube-generic-coverage.xml
        fi
        
        echo "📁 Coverage reports directory contents:"
        ls -la coverage-reports/
    
    - name: SonarCloud Analysis
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      run: |
        brew install sonar-scanner
        
        SONAR_PROJECT_KEY=$(grep "^sonar.projectKey=" sonar-project.properties | cut -d'=' -f2)
        SONAR_ORGANIZATION=$(grep "^sonar.organization=" sonar-project.properties | cut -d'=' -f2)
        
        sonar-scanner \
          -Dsonar.projectKey="$SONAR_PROJECT_KEY" \
          -Dsonar.organization="$SONAR_ORGANIZATION" \
          -Dsonar.sources=VERA/VERAApp/VERA,VERA/VERACore/VERACore,VERA/VERAOpenTok/VERAOpenTok \
          -Dsonar.tests=VERA/VERACore/VERACoreTests,VERA/VERACore/VERACoreSnapshotTests,VERA/VERAOpenTok/VERAOpenTokTests \
          -Dsonar.exclusions="**/*.pdf,**/*.xcassets/**,**/DerivedData/**,**/build/**" \
          -Dsonar.swift.excludedPathsFromCoverage="**/*Tests*/**,**/*Test*/**,**/Mocks/**,**/Preview*/**" \
          -Dsonar.coverageReportPaths=coverage-reports/sonarqube-generic-coverage.xml \
          -Dsonar.host.url=https://sonarcloud.io

  upload-testflight:
    name: Upload to TestFlight
    runs-on: macos-latest
    #needs: [unit-tests, ui-tests]
    needs: [format-check]
    #if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    timeout-minutes: 30
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Pull LFS files
      run: git lfs pull
    
    - name: Set up Xcode
      uses: maxim-lobanov/setup-xcode@v1.6.0
      with:
        xcode-version: latest-stable
    
    - name: Import certificates and profiles
      uses: Apple-Actions/import-codesign-certs@v5.0.2
      with:
        p12-file-base64: ${{ secrets.APPSTORE_CERTIFICATES_FILE_BASE64 }}
        p12-password: ${{ secrets.APPSTORE_CERTIFICATES_PASSWORD }}
    
    - name: Set up App Store Connect API Key
      run: |
        # Create API key directory
        mkdir -p ~/.appstoreconnect/private_keys
        
        # Debug: Check if the secret exists
        if [ -z "${{ secrets.APPSTORE_API_PRIVATE_KEY }}" ]; then
          echo "❌ APPSTORE_API_PRIVATE_KEY secret is not set"
          exit 1
        fi
        
        if [ -z "${{ vars.APPSTORE_API_KEY_ID }}" ]; then
          echo "❌ APPSTORE_API_KEY_ID variable is not set"
          exit 1
        fi
        
        if [ -z "${{ vars.APPSTORE_ISSUER_ID }}" ]; then
          echo "❌ APPSTORE_ISSUER_ID variable is not set"
          exit 1
        fi
        
        # Print the values (for debugging)
        echo "🔧 API Key ID: ${{ vars.APPSTORE_API_KEY_ID }}"
        echo "🔧 Issuer ID: ${{ vars.APPSTORE_ISSUER_ID }}"
        
                # Create the API key file from secret
        echo "🔑 Creating API key file..."
        API_KEY_PATH="$HOME/.appstoreconnect/private_keys/AuthKey_${{ vars.APPSTORE_API_KEY_ID }}.p8"
        echo "📁 Target path: $API_KEY_PATH"
        
        # First, let's check what type of content we have
        SECRET_CONTENT="${{ secrets.APPSTORE_API_PRIVATE_KEY }}"
        
        # Check if the secret starts with PEM header (already decoded)
        if echo "$SECRET_CONTENT" | head -1 | grep -q "BEGIN PRIVATE KEY"; then
          echo "🔍 Secret appears to be already in PEM format (not base64 encoded)"
          # Write directly to file
          echo "$SECRET_CONTENT" > "$API_KEY_PATH"
          echo "✅ PEM content written directly"
        else
          echo "🔍 Secret appears to be base64 encoded, attempting to decode..."
          
          # Write the secret to file and clean it (remove any whitespace/newlines)
          echo "$SECRET_CONTENT" | tr -d '[:space:]' > /tmp/api_key_base64_clean.txt
          
          echo "🔍 Base64 content length: $(wc -c < /tmp/api_key_base64_clean.txt)"
          echo "🔍 Base64 content preview (first 50 chars): $(head -c 50 /tmp/api_key_base64_clean.txt)"
          
          # Decode the base64 content using correct syntax
          if base64 -d -i /tmp/api_key_base64_clean.txt -o "$API_KEY_PATH"; then
            echo "✅ Base64 decode successful"
          else
            echo "❌ Base64 decode failed"
            echo "🔍 Trying alternative method..."
            # Alternative method using pipe
            if cat /tmp/api_key_base64_clean.txt | base64 -d > "$API_KEY_PATH"; then
              echo "✅ Alternative base64 decode successful"
            else
              echo "❌ Both decode methods failed"
              echo "🔍 Treating as raw content and writing directly..."
              echo "$SECRET_CONTENT" > "$API_KEY_PATH"
            fi
          fi
          
          # Clean up temp file
          rm -f /tmp/api_key_base64_clean.txt
        fi
        
        # Verify the file was created and has content
        if [ ! -f "$API_KEY_PATH" ]; then
          echo "❌ Failed to create API key file"
          exit 1
        fi
        
        # Check file size and content
        file_size=$(stat -f%z "$API_KEY_PATH" 2>/dev/null || stat -c%s "$API_KEY_PATH")
        echo "📏 API key file size: $file_size bytes"
        
        if [ "$file_size" -lt 100 ]; then
          echo "❌ API key file seems too small (less than 100 bytes)"
          echo "🔍 File content preview:"
          head -c 200 "$API_KEY_PATH"
          exit 1
        fi
        
        # Verify it looks like a valid PEM file
        if head -1 "$API_KEY_PATH" | grep -q "BEGIN PRIVATE KEY"; then
          echo "✅ API key file appears to be a valid PEM format"
        else
          echo "⚠️ API key file doesn't start with PEM header"
          echo "🔍 First line:"
          head -1 "$API_KEY_PATH"
        fi
        
        echo "✅ API key file created successfully"
        ls -la ~/.appstoreconnect/private_keys/
        
        # Set environment variables for xcodebuild to use the API key
        echo "XCODE_API_KEY_ID=${{ vars.APPSTORE_API_KEY_ID }}" >> $GITHUB_ENV
        echo "XCODE_API_ISSUER_ID=${{ vars.APPSTORE_ISSUER_ID }}" >> $GITHUB_ENV
    
    - name: Download and create provisioning profiles
      run: |
        # Create provisioning profile directory
        mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
        
        # Try to download provisioning profile from App Store Connect
        # You'll need to replace this with your actual provisioning profile
        echo "Creating temporary provisioning profile for Associated Domains..."
        
        # Alternative: Use xcodebuild to generate profiles automatically
        echo "Attempting to generate provisioning profiles automatically..."
    
    - name: Generate build number
      id: buildnumber
      run: |
        # Generate build number based on run number and commit hash
        BUILD_NUMBER="${GITHUB_RUN_NUMBER}.${GITHUB_SHA:0:7}"
        echo "BUILD_NUMBER=$BUILD_NUMBER" >> $GITHUB_OUTPUT
        echo "Generated build number: $BUILD_NUMBER"
    
    - name: Verify API Key file before build
      run: |
        echo "🔍 Verifying API key file exists before build..."
        API_KEY_PATH="$HOME/.appstoreconnect/private_keys/AuthKey_${{ vars.APPSTORE_API_KEY_ID }}.p8"
        
        if [ -f "$API_KEY_PATH" ]; then
          echo "✅ API key file found at: $API_KEY_PATH"
          file_size=$(stat -f%z "$API_KEY_PATH" 2>/dev/null || stat -c%s "$API_KEY_PATH")
          echo "📏 File size: $file_size bytes"
          
          # Check file permissions
          ls -la "$API_KEY_PATH"
          
          # Verify content
          if head -1 "$API_KEY_PATH" | grep -q "BEGIN PRIVATE KEY"; then
            echo "✅ API key file has valid PEM format"
          else
            echo "❌ API key file doesn't have valid PEM format"
            echo "First line: $(head -1 "$API_KEY_PATH")"
            exit 1
          fi
        else
          echo "❌ API key file NOT found at: $API_KEY_PATH"
          echo "Directory contents:"
          ls -la "$HOME/.appstoreconnect/private_keys/" || echo "Directory doesn't exist"
          exit 1
        fi
    
    - name: Build and export IPA
      env:
        API_KEY_PATH: ${{ format('{0}/.appstoreconnect/private_keys/AuthKey_{1}.p8', github.workspace, vars.APPSTORE_API_KEY_ID) }}
      run: |
        # Set up API key path using absolute path
        API_KEY_PATH="$HOME/.appstoreconnect/private_keys/AuthKey_${{ vars.APPSTORE_API_KEY_ID }}.p8"
        
        echo "🔑 Using API key path: $API_KEY_PATH"
        
        # Final verification before build
        if [ ! -f "$API_KEY_PATH" ]; then
          echo "❌ API key file missing at build time!"
          ls -la "$HOME/.appstoreconnect/private_keys/"
          exit 1
        fi
        
        # Build with automatic signing and API key authentication
        xcodebuild archive \
          -workspace VERA/VERA.xcworkspace \
          -scheme VERA \
          -sdk iphoneos \
          -configuration Release \
          -archivePath build/VERA.xcarchive \
          -allowProvisioningUpdates \
          -authenticationKeyPath "$API_KEY_PATH" \
          -authenticationKeyID ${{ vars.APPSTORE_API_KEY_ID }} \
          -authenticationKeyIssuerID ${{ vars.APPSTORE_ISSUER_ID }} \
          DEVELOPMENT_TEAM="PR6C39UQ38" \
          CODE_SIGN_STYLE=Automatic \
          CODE_SIGN_IDENTITY="Apple Distribution" \
          PROVISIONING_PROFILE_SPECIFIER="" \
          CURRENT_PROJECT_VERSION="${{ steps.buildnumber.outputs.BUILD_NUMBER }}"
        
        # Export IPA with API key authentication
        xcodebuild -exportArchive \
          -archivePath build/VERA.xcarchive \
          -exportPath build \
          -exportOptionsPlist ExportOptions.plist \
          -allowProvisioningUpdates \
          -authenticationKeyPath "$API_KEY_PATH" \
          -authenticationKeyID ${{ vars.APPSTORE_API_KEY_ID }} \
          -authenticationKeyIssuerID ${{ vars.APPSTORE_ISSUER_ID }}
    
    - name: Upload to TestFlight
      uses: apple-actions/upload-testflight-build@v3
      with:
        app-path: build/VERA.ipa
        issuer-id: ${{ vars.APPSTORE_ISSUER_ID }}
        api-key-id: ${{ vars.APPSTORE_API_KEY_ID }}
        api-private-key: ${{ secrets.APPSTORE_API_PRIVATE_KEY }}