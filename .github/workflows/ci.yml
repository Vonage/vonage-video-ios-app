  sonarcloud:
    name: SonarCloud Analysis
    runs-on: macos-latest
    #needs: [unit-tests, ui-tests]
    needs: [unit-tests]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' || github.event_name == 'pull_request'
    
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Download unit test results
      uses: actions/download-artifact@v4
      with:
        name: unit-test-results
        path: DerivedData/
    
    #- name: Download UI test results
    #  uses: actions/download-artifact@v4
    #  with:
    #    name: ui-test-results
    #    path: DerivedData/
    
    - name: Generate comprehensive coverage reports
      run: |
        echo "📊 Generating coverage from all test results..."
        
        # Install slather for proper XML coverage conversion
        echo "🔧 Installing slather for SonarCloud XML conversion..."
        gem install slather
        
        # Ensure coverage-reports directory exists
        mkdir -p coverage-reports
        
        # Try to generate coverage reports
        if ./scripts/generate-coverage.sh; then
          echo "✅ Coverage reports generated successfully"
          
          # Verify the XML file exists and is valid
          if [ -f "coverage-reports/sonarqube-generic-coverage.xml" ]; then
            echo "✅ SonarQube XML coverage report found"
            # Basic XML validation
            if xmllint --noout coverage-reports/sonarqube-generic-coverage.xml 2>/dev/null; then
              echo "✅ XML coverage report is valid"
            else
              echo "⚠️ XML coverage report is malformed, creating minimal report"
              echo '<?xml version="1.0" encoding="UTF-8"?><coverage version="1"><file path="dummy.swift"><lineToCover lineNumber="1" covered="false"/></file></coverage>' > coverage-reports/sonarqube-generic-coverage.xml
            fi
          else
            echo "⚠️ XML coverage report not found, creating minimal report"
            echo '<?xml version="1.0" encoding="UTF-8"?><coverage version="1"><file path="dummy.swift"><lineToCover lineNumber="1" covered="false"/></file></coverage>' > coverage-reports/sonarqube-generic-coverage.xml
          fi
          
          # Verify JSON file
          if [ -f "coverage-reports/coverage.json" ]; then
            if jq empty coverage-reports/coverage.json 2>/dev/null; then
              echo "✅ JSON coverage report is valid"
            else
              echo "⚠️ JSON coverage report is malformed, creating minimal report"
              echo '{"coveredLines":0,"executableLines":1}' > coverage-reports/coverage.json
            fi
          else
            echo "⚠️ JSON coverage report not found, creating minimal report"
            echo '{"coveredLines":0,"executableLines":1}' > coverage-reports/coverage.json
          fi
        else
          echo "⚠️ Coverage generation failed, using minimal coverage reports"
          echo '{"coveredLines":0,"executableLines":1}' > coverage-reports/coverage.json
          echo '<?xml version="1.0" encoding="UTF-8"?><coverage version="1"><file path="dummy.swift"><lineToCover lineNumber="1" covered="false"/></file></coverage>' > coverage-reports/sonarqube-generic-coverage.xml
        fi
        
        echo "📁 Coverage reports directory contents:"
        ls -la coverage-reports/
    
    - name: SonarCloud Analysis
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      run: |
        brew install sonar-scanner
        
        SONAR_PROJECT_KEY=$(grep "^sonar.projectKey=" sonar-project.properties | cut -d'=' -f2)
        SONAR_ORGANIZATION=$(grep "^sonar.organization=" sonar-project.properties | cut -d'=' -f2)
        
        sonar-scanner \
          -Dsonar.projectKey="$SONAR_PROJECT_KEY" \
          -Dsonar.organization="$SONAR_ORGANIZATION" \
          -Dsonar.sources=VERA/VERAApp/VERA,VERA/VERACore/VERACore,VERA/VERAOpenTok/VERAOpenTok \
          -Dsonar.tests=VERA/VERACore/VERACoreTests,VERA/VERACore/VERACoreSnapshotTests,VERA/VERAOpenTok/VERAOpenTokTests \
          -Dsonar.exclusions="**/*.pdf,**/*.xcassets/**,**/DerivedData/**,**/build/**" \
          -Dsonar.swift.excludedPathsFromCoverage="**/*Tests*/**,**/*Test*/**,**/Mocks/**,**/Preview*/**" \
          -Dsonar.coverageReportPaths=coverage-reports/sonarqube-generic-coverage.xml \
          -Dsonar.host.url=https://sonarcloud.io

  upload-testflight:
    name: Upload to TestFlight
    runs-on: macos-latest
    #needs: [unit-tests, ui-tests]
    needs: [unit-tests]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    timeout-minutes: 30
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Pull LFS files
      run: git lfs pull
    
    - name: Import certs
      uses: Apple-Actions/import-codesign-certs@v5.0.2
      with:
        p12-file-base64: ${{ secrets.APPSTORE_CERTIFICATES_FILE_BASE64 }}
        p12-password: ${{ secrets.APPSTORE_CERTIFICATES_PASSWORD }}

    - name: Provisioning profile
      uses: Apple-Actions/download-provisioning-profiles@v4
      with:
        profile-type: IOS_APP_STORE
        bundle-id: 'com.vonage.VERA'
        issuer-id: ${{ vars.APPSTORE_ISSUER_ID }}
        api-key-id: ${{ vars.APPSTORE_API_KEY_ID }}
        api-private-key: ${{ secrets.APPSTORE_API_PRIVATE_KEY }}
    
    - name: Generate build number
      id: buildnumber
      run: |
        # Generate build number with only numeric values for App Store compatibility
        # Use timestamp to ensure uniqueness and avoid conflicts
        TIMESTAMP=$(date +%s)
        BUILD_NUMBER="${GITHUB_RUN_NUMBER}.${TIMESTAMP: -6}"
        echo "BUILD_NUMBER=$BUILD_NUMBER" >> $GITHUB_OUTPUT
        echo "Generated build number: $BUILD_NUMBER"
    
    - name: Build archive
      run: |
          echo "Building archive with build number: ${{ steps.buildnumber.outputs.BUILD_NUMBER }}"
          xcodebuild -workspace VERA/VERA.xcworkspace \
            -scheme VERA \
            -sdk iphoneos \
            -configuration Release \
            -allowProvisioningUpdates \
            -archivePath $PWD/build/VERA.xcarchive \
            CURRENT_PROJECT_VERSION="${{ steps.buildnumber.outputs.BUILD_NUMBER }}" \
            archive | xcpretty

    - name: Export IPA
      run: |
        xcodebuild -exportArchive \
            -archivePath "$PWD/build/VERA.xcarchive" \
            -exportOptionsPlist "$PWD/ExportOptions.plist" \
            -allowProvisioningUpdates \
            -exportPath "$PWD/build" | xcpretty

    - name: Upload to TestFlight
      uses: apple-actions/upload-testflight-build@v3
      with:
        app-path: build/VERA.ipa
        issuer-id: ${{ vars.APPSTORE_ISSUER_ID }}
        api-key-id: ${{ vars.APPSTORE_API_KEY_ID }}
        api-private-key: ${{ secrets.APPSTORE_API_PRIVATE_KEY }}