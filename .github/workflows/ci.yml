name: CI

permissions:
  contents: write
  actions: read

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  format-check:
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v4

    - name: Install swift-format
      run: brew install swift-format
  
    - name: Check Swift formatting
      run: |
        chmod +x scripts/format.sh
        ./scripts/format.sh --check

  unit-tests:
    runs-on: macos-latest
    needs: [format-check]
    outputs:
      test-results: ${{ steps.tests.outcome }}
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Pull LFS files
      run: git lfs pull

    - name: Cache derived data
      uses: actions/cache@v4
      with:
        path: ~/Library/Developer/Xcode/DerivedData
        key: ${{ runner.os }}-derived-data-${{ hashFiles('**/*.xcworkspace', '**/*.xcodeproj') }}
        restore-keys: |
          ${{ runner.os }}-derived-data-
    
    - name: List available simulators
      run: |
        echo "📱 Available iOS Simulators:"
        xcrun simctl list devices

    - name: Run VERACoreTests (macOS)
      id: core-tests-macos
      run: |
        echo "🧪 Running VERACoreTests on macOS"
        xcodebuild test \
          -workspace VERA/VERA.xcworkspace \
          -scheme VERACore \
          -destination "platform=macOS" \
          -only-testing:VERACoreTests \
          -derivedDataPath DerivedData \
          -enableCodeCoverage YES \
          -resultBundlePath DerivedData/VERACoreTests-macOS.xcresult \
          CODE_SIGN_IDENTITY="" \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGNING_ALLOWED=NO

    # Temporarily disabled until CI Xcode version is updated
    # - name: Run VERACoreSnapshotTests (iOS Simulator)
    #   id: snapshot-tests
    #   run: |
    #     echo "📸 Running VERACoreSnapshotTests on iOS Simulator"
    #     xcodebuild test \
    #       -workspace VERA/VERA.xcworkspace \
    #       -scheme VERACoreSnapshotTests \
    #       -destination "platform=iOS Simulator,name=iPhone 16" \
    #       -derivedDataPath DerivedData \
